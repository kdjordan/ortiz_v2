server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy the admin API to the Fastify backend. `^~` makes this prefix win
  # over the static-asset regex below for every /api/* path, and over the SPA
  # try_files fallback. The api host is resolved per-request via Docker's embedded
  # DNS (127.0.0.11) using a variable in proxy_pass, so nginx still boots when the
  # backend is down (an /api request then 502s instead of crashing startup).
  # Set-Cookie from the backend passes through untouched (no proxy_hide_header).
  location ^~ /api/ {
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $cms_api http://api:3001;
    proxy_pass $cms_api;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Headroom over the API's 25MB upload cap so a large image reaches the backend
    # (which enforces the real limit) instead of being rejected by nginx first.
    client_max_body_size 30m;
  }

  location / {
    # $uri.html serves the prerendered pages (vite-ssg emits /about.html, etc.)
    try_files $uri $uri.html $uri/ /index.html;
  }

  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?)$ {
    try_files $uri =404;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }
}
